<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniProject - Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class = 'container-fluid d-flex justify-content-between p-3 '>
        <h1>Weather App</h1>
        <a href="https://www.linkedin.com/in/thirukkumaran-vm-learner/" target="_blank"><button>in</button></a>
    </header>

    <div class = 'container-fluid d-flex justify-content-center align-items-center' id = 'mainSpace'>
        <div class = 'd-block' id = 'block'>
            <form id = 'inputSpace'>
                <input type="text" autocomplete ="off" id="cityName" placeholder = 'Enter the city name'>
                <button id="search">Search</button>
            </form>
            <div id = 'valueDisplay'>
                <h2 id="city">City/Country</h2>
                <h2 id="weatherEmoji">☀️</h2>
                <h2 id="temperature">Temperature</h2>
                <h2 id="humidity">Humidity</h2>
                <h2 id="weather">Weather</h2>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
